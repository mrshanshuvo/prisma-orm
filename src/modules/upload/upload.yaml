paths:
  /upload/single:
    post:
      summary: Upload a single file to Cloudinary
      tags:
        - Uploads
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
      responses:
        201:
          description: File uploaded successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "File uploaded successfully to Cloudinary"
                  data:
                    type: object
                    properties:
                      url:
                        type: string
                        example: "https://res.cloudinary.com/demo/image/upload/sample.jpg"
        400:
          description: No file uploaded

  /upload/multiple:
    post:
      summary: Upload multiple files to Cloudinary
      tags:
        - Uploads
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - files
              properties:
                files:
                  type: array
                  items:
                    type: string
                    format: binary
                  maxItems: 10
      responses:
        201:
          description: Files uploaded successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Files uploaded successfully to Cloudinary"
                  data:
                    type: object
                    properties:
                      urls:
                        type: array
                        items:
                          type: string
                        example: ["https://res.cloudinary.com/demo/image/upload/sample1.jpg", "https://res.cloudinary.com/demo/image/upload/sample2.jpg"]
        400:
          description: No files uploaded
