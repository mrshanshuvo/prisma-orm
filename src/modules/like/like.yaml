paths:
  /likes:
    get:
      summary: Get all likes (paginated/filtered)
      tags:
        - Likes
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 10
        - in: query
          name: postId
          schema:
            type: integer
          description: Filter likes by post ID
        - in: query
          name: userId
          schema:
            type: integer
          description: Filter likes by user ID
      responses:
        200:
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Success"
                  data:
                    type: object
                    properties:
                      meta:
                        $ref: '#/components/schemas/Meta'
                      result:
                        type: array
                        items:
                          $ref: '#/components/schemas/Like'
    post:
      summary: Toggle like status (Like/Unlike)
      tags:
        - Likes
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - postId
                - userId
              properties:
                postId:
                  type: integer
                  example: 1
                userId:
                  type: integer
                  example: 1
      responses:
        200:
          description: Like removed successfully (Unlike)
        201:
          description: Like added successfully (Like)
        400:
          description: Bad request / validation error

  /likes/{id}:
    get:
      summary: Get like by ID
      tags:
        - Likes
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        200:
          description: Success
        404:
          description: Like not found

components:
  schemas:
    Like:
      type: object
      properties:
        id:
          type: integer
          example: 1
        postId:
          type: integer
          example: 1
        userId:
          type: integer
          example: 1
